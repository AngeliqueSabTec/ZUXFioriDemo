# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: zuxfioridemo.zuxfioridemo
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: S4D_100
          url: http://s4d.virtual:443
          client: '100'
        app:
          name: ZUXFIORI_DEMO
          description: zuxfiori_demo
          package: ZUX410_SOL
          transport: S4DK900241
        exclude:
          - /test/
          - /localService/
